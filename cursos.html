<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div id="message-box"></div>

      <div id="curso-section">
        <h2>Cadastrar novo curso</h2>

        <form id="curso-form">
          <div class="form-group">
            <label for="curso-titulo">Título</label>
            <input
              type="text"
              id="curso-titulo"
              required
              placeholder="titulo"
            />
          </div>

          <div class="form-group">
            <label for="curso-descricao">Descrição</label>
            <input
              type="text"
              id="curso-descricao"
              required
              placeholder="Breve descrição do curso"
            />
          </div>
          <div class="form-group">
            <label for="curso-carga">Carga Horária</label>
            <input
              type="number"
              id="curso-carga"
              required
              placeholder="Ex: 40 horas"
            />
          </div>
    
          <button type="submit" id="curso-btn">Cadastrar</button>
        </form>
        <div class="nav-link-container">
            <a href="login.html">Voltar para o Painel</a>
        </div>
      </div>
    </div>
    <script src="curso.js"></script>
  </body>
</html>
